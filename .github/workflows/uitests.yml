name: UITests

# kurlUITests 스모크 — swiftlint 만으로는 UI 테스트가 방치돼 드리프트하므로,
# PR 마다 시뮬레이터에서 실제로 돌려 회귀를 조기에 드러낸다.
#
# 비필수(informational) 로 시작하는 이유:
#   1) UI 테스트는 느리고 간헐적(flaky)이다. 첫 도입부터 required 로 걸면
#      멀쩡한 PR 이 인프라 흔들림으로 막힌다.
#   2) 이 앱은 iOS 27 SDK 로 빌드하는 게 정식 툴체인이다
#      (AGENTS.md §3, Xcode 27 베타). 그런데 GitHub-hosted 러너에는
#      Xcode 27 이 아직 없다(macos-15 이미지 최신 = Xcode 26.3 / iOS 26 SDK).
#      앱 코드가 27-only API(GlassEffectTransition.materialize)를 #available 가드
#      없이 쓰고 있어(EngagementDock.swift), iOS 26 SDK 로는 컴파일이 실패한다.
#      → 러너가 Xcode 27 을 제공하거나, 27-only 호출을 #available(iOS 27) 로
#        감싸기 전까지는 빌드가 빨간불일 수 있다. 그 사실을 CI 를 막지 않고
#        보이게만 한다(continue-on-error + 결과 아티팩트/요약).
#
# 안정화되면(러너 Xcode 27 도입 또는 27-only 가드 후 그린 확인) job 의
# continue-on-error 를 지우고 required 체크로 승격 권장.

on:
  pull_request:
    paths:
      - 'kurl/**/*.swift'
      - 'kurl/kurl.xcodeproj/**'
      - '.github/workflows/uitests.yml'
  workflow_dispatch:

concurrency:
  group: uitests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uitests:
    name: kurlUITests (iOS Simulator)
    # macos-14 는 최대 Xcode 16.2 / iOS 18.2 SDK 라 배포 타깃 26.0 인 이 앱을
    # 빌드할 수 없다. macos-15 만 iOS 26 SDK + iPhone 17 Pro 시뮬을 제공한다.
    runs-on: macos-15
    # 위 헤더 근거로 첫 도입은 비필수. 빨간불이어도 PR 을 막지 않는다.
    continue-on-error: true
    timeout-minutes: 40

    env:
      SCHEME: kurlUITests
      PROJECT: kurl/kurl.xcodeproj
      # iPhone 17 Pro 는 macos-15 이미지에 존재. OS 는 러너 최신 iOS 런타임.
      DESTINATION: 'platform=iOS Simulator,name=iPhone 17 Pro'
      RESULT_BUNDLE: TestResults.xcresult

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # 정식 툴체인은 Xcode 27 베타지만 GitHub-hosted 러너엔 없다.
        # 이미지에 설치된 것 중 가장 최신 stable(26.x)을 고른다.
        # (러너 이미지에 27 이 추가되면 이 스텝만 27 로 바꾸면 된다.)
        run: |
          set -euo pipefail
          echo "설치된 Xcode 목록:"
          for app in /Applications/Xcode*.app; do echo "  $app"; done
          # 26 대 중 가장 높은 버전을 선택. 없으면 러너 기본값 유지.
          LATEST_26=""
          for app in /Applications/Xcode_26*.app; do
            [ -d "$app" ] || continue
            if [ -z "$LATEST_26" ] || [ "$(printf '%s\n%s\n' "$LATEST_26" "$app" | sort -V | tail -1)" = "$app" ]; then
              LATEST_26="$app"
            fi
          done
          if [ -n "$LATEST_26" ]; then
            sudo xcode-select -s "$LATEST_26/Contents/Developer"
          else
            echo "::warning::Xcode 26.x 를 못 찾았다 — 러너 기본 Xcode 로 진행(iOS 26 SDK 없으면 빌드 실패 가능)."
          fi
          xcodebuild -version
          echo "iOS SDK: $(xcrun --sdk iphonesimulator --show-sdk-version)"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('kurl/kurl.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          # SPM 은 러너에서 네트워크로 정상 해석되므로 clonedSourcePackages 는
          # 지정하지 않는다(기본 DerivedData 경로 사용). 캐시로 재해석만 아낀다.
          path: ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('kurl/kurl.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'kurl/**/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Boot simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available | grep -i 'iPhone 17 Pro' || {
            echo "::warning::iPhone 17 Pro 시뮬을 목록에서 못 찾음 — 사용 가능 기기:"
            xcrun simctl list devices available
          }
          # destination 이 첫 실행 시 부팅을 처리하지만, 미리 띄워 안정화한다.
          xcrun simctl boot 'iPhone 17 Pro' 2>/dev/null || true
          xcrun simctl bootstatus 'iPhone 17 Pro' -b || true

      - name: Run kurlUITests
        # -retry-tests-on-failure + -test-iterations 3: 실패한 테스트만 최대
        # 3회까지 재시도해 flaky 잡음을 줄인다(전량 3회 반복이 아니라 실패분만).
        # continue-on-error(job) 이므로 실패해도 다음 스텝(아티팩트 업로드)은 돈다.
        # xcbeautify 는 macos 러너 기본 설치. 없으면 raw 로그로 폴백.
        run: |
          set -o pipefail
          FORMAT="cat"
          if command -v xcbeautify >/dev/null 2>&1; then FORMAT="xcbeautify"; fi
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CODE_SIGNING_ALLOWED=NO \
            | $FORMAT || echo "::warning::xcodebuild test 실패 — 아래 아티팩트/요약에서 원인 확인(빌드 실패면 헤더의 27-SDK 이슈 참고)."

      - name: Summarize result
        if: always()
        run: |
          set +e
          if [ -d "$RESULT_BUNDLE" ]; then
            BUNDLE_LINE="- 결과 번들: \`${RESULT_BUNDLE}\` (아티팩트로 업로드됨)"
          else
            BUNDLE_LINE="- 결과 번들 없음(빌드 단계 실패 가능)."
          fi
          {
            echo "## kurlUITests 결과"
            echo ""
            echo "- Xcode: \`$(xcodebuild -version | head -1)\`"
            echo "- iOS Simulator SDK: \`$(xcrun --sdk iphonesimulator --show-sdk-version)\`"
            echo "- Destination: \`${DESTINATION}\`"
            echo "$BUNDLE_LINE"
            echo ""
            echo "> 이 잡은 비필수(informational)다. 자세한 배경은 워크플로 상단 주석 참고."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kurlUITests-result-bundle
          path: ${{ env.RESULT_BUNDLE }}
          if-no-files-found: warn
          retention-days: 7
